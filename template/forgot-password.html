<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Reset your password and regain access to your aptitude test account." />
  <meta name="theme-color" content="#e4cb71" />
  <title>Forgot Password - Aptitude Test</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/CSS/responsive.css" />
  <link rel="stylesheet" href="/static/CSS/login.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Rye&family=Rozha+One&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div class="container">
    <div class="left-section">
      <div class="form-wrap">
        <div class="welcome">
          <h1 class="welcome-title">Reset<br>Password</h1>
          <p class="welcome-subtitle">Enter your registered email and your new password to restore access.</p>
        </div>
        <div class="login-card">
          <div class="login-logo">
            <i class="fa-solid fa-key"></i>
          </div>
          <h2 class="login-heading">RESET</h2>

          <div class="input-box">
            <input type="email" id="reset-email" placeholder="EMAIL" autocomplete="email" />
            <i class="fa-solid fa-envelope"></i>
          </div>
          <div class="input-box">
            <input type="password" id="reset-password" placeholder="NEW PASSWORD" autocomplete="new-password" />
            <i class="fa-solid fa-eye" id="toggle-pw1"></i>
          </div>
          <div class="input-box">
            <input type="password" id="reset-confirm" placeholder="CONFIRM NEW PASSWORD" autocomplete="new-password" />
            <i class="fa-solid fa-eye" id="toggle-pw2"></i>
          </div>

          <button class="login-btn" id="reset-submit">
            <span class="btn-text">RESET PASSWORD</span>
            <i class="fa-solid fa-arrow-right btn-icon"></i>
          </button>

          <div class="divider"><span>or back to login</span></div>

          <div class="signup-text">
            Remembered your password? <a href="/login">Login</a>
          </div>
        </div>
      </div>
    </div>

    <div class="right-section">
      <div class="right-content">
        <div class="brand-badge">
          <img src="/images/Apti-logo.png" alt="Apti Logo" class="brand-logo" />
        </div>
        <h2 class="right-heading">Secure. Fast.<br>Reliable.</h2>
        <p class="right-sub">Your preparation records are safe with us. Reset your password and jump straight back in.
        </p>
        <div class="hero-illustration">
          <img src="/images/Sign-up logo.jpeg" alt="Reset Password Illustration" />
        </div>
      </div>
    </div>
  </div>

  <script src="/static/JS/script.js"></script>
  <script src="/static/JS/responsive.js"></script>
  <script>
    // Password toggle helpers
    function makeToggle(iconId, inputId) {
      document.getElementById(iconId)?.addEventListener('click', function () {
        const inp = document.getElementById(inputId);
        const isPass = inp.type === 'password';
        inp.type = isPass ? 'text' : 'password';
        this.classList.toggle('fa-eye', !isPass);
        this.classList.toggle('fa-eye-slash', isPass);
      });
    }
    makeToggle('toggle-pw1', 'reset-password');
    makeToggle('toggle-pw2', 'reset-confirm');

    // Submit reset password request
    document.getElementById('reset-submit')?.addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('reset-email').value.trim();
      const password = document.getElementById('reset-password').value;
      const confirm = document.getElementById('reset-confirm').value;
      const btn = document.getElementById('reset-submit');

      if (!email || !password || !confirm) {
        showNotification('Please fill in all fields', 'error');
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showNotification('Enter a valid email', 'error');
        return;
      }
      if (password.length < 8) {
        showNotification('Password must be at least 8 characters', 'error');
        return;
      }
      if (password !== confirm) {
        showNotification('Passwords do not match', 'error');
        return;
      }

      btn.disabled = true;
      btn.querySelector('.btn-text').textContent = 'Resetting…';

      try {
        const res = await fetch('/api/v1/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, new_password: password })
        });
        const data = await res.json();
        if (!res.ok) {
          showNotification(data.error || 'Password reset failed', 'error');
          return;
        }

        showNotification('Password reset successful! Redirecting to login…', 'success');
        setTimeout(() => {
          window.location.href = '/login';
        }, 1500);
      } catch {
        showNotification('Unable to connect to server', 'error');
      } finally {
        btn.disabled = false;
        btn.querySelector('.btn-text').textContent = 'RESET PASSWORD';
      }
    });

    // Enter key submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('reset-submit')?.click();
    });
  </script>
</body>

</html>
