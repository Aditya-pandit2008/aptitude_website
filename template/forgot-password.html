<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Reset your password and regain access to your aptitude test account." />
    <meta name="theme-color" content="#e4cb71" />
    <title>Forgot Password - Aptitude Test</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/CSS/login.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Rye&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container">
      <div class="left-section">
        <div class="welcome">
          <h1 class="welcome-title">Forgot Password</h1>
          <p class="welcome-subtitle">Enter your email and reset your password securely.</p>
        </div>

        <div class="login-card">
          <h2 class="login-heading">RESET PASSWORD</h2>
          <div class="input-box">
            <input type="email" placeholder="EMAIL" />
            <i class="fa-solid fa-envelope"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="NEW PASSWORD" />
            <i class="fa-solid fa-eye"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="CONFIRM PASSWORD" />
            <i class="fa-solid fa-eye"></i>
          </div>
          <button class="login-btn">RESET PASSWORD</button>
          <div class="signup-text">
            Remember your password? <a href="/template/login.html">Login</a>
          </div>
        </div>
      </div>

      <div class="right-section">
        <img src="/images/Sign-up logo.jpeg" alt="Forgot Password Image" />
      </div>
    </div>
    <script src="/static/JS/script.js"></script>
  </body>
</html>
