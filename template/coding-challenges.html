<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coding Challenges - Aptitude AI</title>
  <link rel="stylesheet" href="/static/CSS/test-page.css">
  <link rel="stylesheet" href="/static/CSS/coding.css">
  <link rel="stylesheet" href="/static/CSS/responsive.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <button id="close-btn" aria-label="Close menu">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <a class="logo" href="/Dashboard">
        <img src="/images/Apti-logo.png" alt="Logo">
      </a>
      <a class="active-task" href="/Dashboard">
        <i class="fa-solid fa-table-columns"></i>
        <span>Dashboard</span>
      </a>
      <div class="menu-section">
        <h4>Modules</h4>
        <ul>
            <li><a href="/test-page"><i class="fa-solid fa-brain"></i> Aptitude Tests</a></li>
            <li class="active"><a href="/coding-challenges"><i class="fa-solid fa-code"></i> Coding Challenges</a></li>
        </ul>
      </div>
      <hr>
      <div class="menu-section">
        <h4>Account</h4>
        <ul>
          <li data-action="logout">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
          </li>
        </ul>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

      <!-- NAVBAR -->
      <nav class="navbar">
        <div class="left-nav">
          <i class="fa-solid fa-bars" id="menu-btn"></i>
          <img src="/images/Apti-logo.png" alt="Logo">
        </div>
        <div class="right-nav">
          <div class="search-box">
            <input id="challenge-search" type="text" placeholder="Search challenges…">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
        </div>
      </nav>

      <!-- BUILDER -->
      <section class="task-builder">
        <div>
          <p class="eyebrow">Groq AI Coding Challenges</p>
          <h1>Coding Arena</h1>
          <p class="subtext">
            Sharpen your programming skills with dynamic coding problems generated by Groq AI. Practice data structures, algorithms, and logical thinking.
          </p>
        </div>

        <div class="control-panel">
          <label>
            Topic
            <select id="challenge-category">
              <option value="" disabled selected>Select Topic</option>
              <option value="Data Structures">Data Structures</option>
              <option value="Algorithms">Algorithms</option>
              <option value="Strings">Strings</option>
              <option value="Math">Math</option>
              <option value="Greedy">Greedy</option>
              <option value="Dynamic Programming">Dynamic Programming</option>
              <option value="Recursion">Recursion</option>
              <option value="Sorting">Sorting</option>
              <option value="Search">Search</option>
              <option value="Graphs">Graphs</option>
              <option value="Bit Manipulation">Bit Manipulation</option>
              <option value="Two Pointers">Two Pointers</option>
            </select>
          </label>

          <label>
            Difficulty
            <select id="challenge-difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </label>

          <button id="generate-challenge-btn" class="primary-btn start-full" style="grid-column: span 2;">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            Generate New Challenge
          </button>
        </div>
      </section>

      <!-- CHALLENGE LIST -->
      <section id="challenge-list-container" class="task-grid">
        <!-- Challenges will be dynamically injected here -->
      </section>

    </main>
  </div>

  <script src="/static/JS/script.js"></script>
  <script src="/static/JS/coding-list.js"></script>
  <script src="/static/JS/responsive.js"></script>
</body>
</html>
